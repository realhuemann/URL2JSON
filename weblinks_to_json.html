<html>
    <body>
        <h1>URL2JSON</h1>
        <input type="text" id="input" placeholder="Paste links here">
        <input type="button" id="button" value="Extract URLs">
    </body>
</html>

<script>
    let input = document.getElementById("input");
    let button = document.getElementById("button");

    button.addEventListener("click", function(){
        let input_text = input.value;
        const urlRegex = /(https?:\/\/[^\s]+)/gi; 
        const foundUrls = input_text.match(urlRegex);
        alert(foundUrls ? foundUrls : "No URLs found!");
        downloadJson(foundUrls, "URLS")
    });

    function downloadJson(objectData, filename) {
  const jsonString = JSON.stringify(objectData, null, 2);
  const blob = new Blob([jsonString], { type: 'application/json;charset=utf-8,' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || 'data.json'; 
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url); 
}

</script>
